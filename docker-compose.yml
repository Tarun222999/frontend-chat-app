services:
  web:
    build:
      context: .
    image: frontend-chat:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PERSONAL_CHAT_SERVICE_MODE: ${PERSONAL_CHAT_SERVICE_MODE:-mock}
      PERSONAL_CHAT_GATEWAY_URL: ${DOCKER_PERSONAL_CHAT_GATEWAY_URL:-http://host.docker.internal:4000}
      PERSONAL_CHAT_SOCKET_URL: ${DOCKER_PERSONAL_CHAT_SOCKET_URL:-http://host.docker.internal:4002}
      PERSONAL_CHAT_GATEWAY_FETCH_TIMEOUT_MS: ${PERSONAL_CHAT_GATEWAY_FETCH_TIMEOUT_MS:-5000}
      PERSONAL_CHAT_SESSION_TTL_SECONDS: ${PERSONAL_CHAT_SESSION_TTL_SECONDS:-604800}
      PERSONAL_CHAT_REALTIME_BRIDGE_TTL_SECONDS: ${PERSONAL_CHAT_REALTIME_BRIDGE_TTL_SECONDS:-1800}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
