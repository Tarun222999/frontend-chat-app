openapi: 3.0.3
info:
  title: ChatApp Gateway API
  version: 1.0.0
  description: Public HTTP API exposed by gateway-service. Swagger UI is served from the gateway, and realtime Socket.IO events are documented separately in docs/socketio-appendix.md.
servers:
  - url: /
    description: Same-origin gateway base URL
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Conversations
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered and tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/revoke:
    post:
      tags: [Auth]
      summary: Revoke refresh tokens for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
      responses:
        '204':
          description: Tokens revoked
        '422':
          $ref: '#/components/responses/ValidationError'
  /users:
    get:
      tags: [Users]
      summary: List all users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags: [Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelopeResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users/dm-candidates:
    get:
      tags: [Users]
      summary: List direct-message candidates for the caller
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummaryListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /users/search:
    get:
      tags: [Users]
      summary: Search users by query string
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 255
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 25
        - in: query
          name: exclude
          required: false
          description: One or more user IDs to omit from search results.
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users/{id}:
    get:
      tags: [Users]
      summary: Get a user by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelopeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /conversations:
    get:
      tags: [Conversations]
      summary: List conversations for the caller
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: participantId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Conversations]
      summary: Create a conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /conversations/{id}:
    get:
      tags: [Conversations]
      summary: Get a conversation by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /conversations/{id}/messages:
    get:
      tags: [Conversations]
      summary: List messages in a conversation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: before
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: after
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Conversations]
      summary: Send a message in a conversation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /direct-conversations:
    post:
      tags: [Conversations]
      summary: Create or open a direct conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDirectConversationRequest'
      responses:
        '200':
          description: Conversation returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConversationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: gateway-service
      required: [status, service]
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [message]
    ValidationIssue:
      type: object
      additionalProperties: false
      properties:
        path:
          type: string
        message:
          type: string
      required: [path, message]
    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            details:
              type: object
              additionalProperties: false
              properties:
                issues:
                  type: array
                  items:
                    $ref: '#/components/schemas/ValidationIssue'
              required: [issues]
    AuthTokens:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]
    AuthUser:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, email, displayName, createdAt]
    AuthResponse:
      allOf:
        - $ref: '#/components/schemas/AuthTokens'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/AuthUser'
          required: [user]
    RegisterRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 3
          maxLength: 30
      required: [email, password, displayName]
    LoginRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [email, password]
    RefreshRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
      required: [refreshToken]
    RevokeRequest:
      type: object
      additionalProperties: false
      properties:
        userId:
          type: string
          format: uuid
      required: [userId]
    User:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, displayName, createdAt, updatedAt]
    UserSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
      required: [id, displayName]
    CreateUserRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 3
          maxLength: 255
      required: [email, displayName]
    UserEnvelopeResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/User'
      required: [data]
    UserListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required: [data]
    UserSummaryListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
      required: [data]
    ConversationParticipant:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
      required: [id, displayName]
    ConversationKind:
      type: string
      enum: [direct, group]
    Conversation:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: '#/components/schemas/ConversationKind'
        title:
          type: string
          nullable: true
        participantIds:
          type: array
          items:
            type: string
            format: uuid
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ConversationParticipant'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        lastMessagePreview:
          type: string
          nullable: true
      required:
        - id
        - kind
        - title
        - participantIds
        - createdAt
        - updatedAt
        - lastMessageAt
        - lastMessagePreview
    CreateConversationRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        participantIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
      required: [participantIds]
    CreateDirectConversationRequest:
      type: object
      additionalProperties: false
      properties:
        participantId:
          type: string
          format: uuid
      required: [participantId]
    ConversationEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/Conversation'
      required: [data]
    ConversationListEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
      required: [data]
    Reaction:
      type: object
      additionalProperties: false
      properties:
        emoji:
          type: string
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required: [emoji, userId, createdAt]
    Message:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        reactions:
          type: array
          items:
            $ref: '#/components/schemas/Reaction'
      required: [id, conversationId, senderId, body, createdAt, reactions]
    CreateMessageRequest:
      type: object
      additionalProperties: false
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000
      required: [body]
    MessageEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/Message'
      required: [data]
    MessageListEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Message'
      required: [data]
